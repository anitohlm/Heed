name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
    # Only run when something that affects the static deploy changes.
    # Pushes that only touch docs / memory / config don't burn Actions
    # minutes anymore.
    paths:
      - 'web/out/**'
      - 'web/app/**'
      - 'web/**/*.json'
      - 'web/**/*.js'
      - 'web/**/*.jsx'
      - 'web/**/*.ts'
      - 'web/**/*.tsx'
      - 'web/**/*.css'
      - '.github/workflows/**'
  pull_request:
    types: [opened, reopened, closed]
    branches:
      - main

# Cancel in-flight runs when a new push lands on the same ref. Saves
# minutes when we push several commits in quick succession.
concurrency:
  group: swa-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BRAVE_POND_035757400 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/web/out"
          api_location: ""
          output_location: ""
          skip_app_build: true
        env:
          NEXT_PUBLIC_FUNCTIONS_URL: https://func-heed-flex.azurewebsites.net

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BRAVE_POND_035757400 }}
          action: "close"
